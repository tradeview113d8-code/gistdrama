name: Chimera Trend Collector

on:
  schedule:
    - cron: '0 */4 * * *'  # Mỗi 4 giờ
  workflow_dispatch:

concurrency:
  group: gist-update
  cancel-in-progress: false

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⏬ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run collector
        env:
          GIST_TOKEN:  ${{ secrets.GHT_TOKEN }}
          GIST_ID:     ${{ secrets.GIST_ID }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          echo "=== Bắt đầu thu thập trend ==="
          echo "Thời gian: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          python collect.py

      - name: 📋 Post-run summary
        if: always()
        run: |
          echo "## 📊 Kết quả chạy" >> $GITHUB_STEP_SUMMARY
          echo "- Thời gian: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Gist ID: ${{ secrets.GIST_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Link Gist: https://gist.github.com/${{ secrets.GIST_ID }}" >> $GITHUB_STEP_SUMMARY
