name: Auto Scrape Hot News GenZ

on:
  schedule:
    # Chạy vào phút 0 của các giờ 0, 6, 12, 18 (Tức là 6 tiếng/lần)
    - cron: '0 */6 * * *' 
  workflow_dispatch: # Cho phép bấm nút chạy thủ công trên GitHub để test

jobs:
  scrape-and-save:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install apify-client pymongo python-dotenv

    - name: Run Pipeline
      env:
        APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: python main.py
